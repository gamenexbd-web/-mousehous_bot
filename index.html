<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ADS Management Pro</title>

<!-- External SDKs -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root { --primary: #00f2fe; --secondary: #4facfe; --accent: #ffd700; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
body { margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif; background: radial-gradient(circle at top, #1e293b, #0f172a); display: flex; justify-content: center; align-items: center; color: #fff; overflow: hidden; }

/* 🚫 Telegram Only UI */
#tgOnly { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 10001; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }

/* 🛡️ Start Overlay */
#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }

.main-container { width: 92%; max-width: 400px; padding: 35px 20px; border-radius: 30px; background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; position: relative; }

/* ⏱️ Watching Timer Badge */
#viewingBadge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #ff4757; color: white; padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: bold; display: none; z-index: 100; white-space: nowrap; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); }

.wallet-box { background: rgba(0, 0, 0, 0.25); padding: 25px; border-radius: 24px; margin-bottom: 25px; border: 1px solid var(--border); }
#adCount { font-size: 48px; font-weight: 800; color: var(--accent); text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }

.timer-info { font-size: 14px; color: #cbd5e1; margin-bottom: 12px; }
#countdown { color: var(--primary); font-weight: 800; }

.progress-track { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 1s linear; box-shadow: 0 0 10px var(--primary); }

.btn-start { padding: 18px 50px; font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 18px; color: #000; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 242, 254, 0.3); transition: 0.2s; }
.btn-start:active { transform: scale(0.95); }

#netStatus { position: absolute; top: 20px; right: 20px; font-size: 10px; padding: 5px 12px; border-radius: 20px; background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); font-weight: bold; }
</style>
</head>

<body oncontextmenu="return false;">

<!-- Access Restriction -->
<div id="tgOnly">
    <div style="font-size: 70px; margin-bottom: 20px;">🚫</div>
    <h2 style="color: #fff;">Access Restricted</h2>
    <p style="color: #94a3b8;">This app only works inside the <br><b>Official Telegram Application</b>.</p>
</div>

<div id="netStatus">CONNECTING...</div>

<!-- 🛡️ Smart Start Button -->
<div id="overlay">
  <div style="padding: 40px 30px; background: var(--glass); border-radius: 35px; border: 1px solid var(--border); width: 85%; max-width: 350px;">
    <div style="font-size: 55px; margin-bottom: 15px;">🛡️</div>
    <h2 style="margin-bottom: 10px;">Verify Security</h2>
    <p style="color: #94a3b8; font-size: 14px; margin-bottom: 30px;">Click the button below to verify human interaction and start earning coins.</p>
    <button class="btn-start" onclick="initRealClick()">START SYSTEM</button>
  </div>
</div>

<div class="main-container">
  <div id="viewingBadge">WATCHING AD: <span id="viewingSec">0</span>s</div>
  <h2 style="font-size: 22px; margin-top: 5px; color: #e2e8f0;">ADS DASHBOARD</h2>
  
  <div class="wallet-box">
    <div style="font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Accumulated Balance</div>
    <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
      <span style="font-size: 32px;">💰</span>
      <span id="adCount">0</span>
    </div>
  </div>

  <div class="status-section">
    <div class="timer-info" id="timerLabel">Status: <span id="countdown">Waiting...</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
  </div>
  
  <div style="margin-top: 25px; font-size: 11px; color: #4ade80; display: flex; align-items: center; justify-content: center; gap: 6px;">
    <div style="width:6px; height:6px; background:#4ade80; border-radius:50%; box-shadow: 0 0 8px #4ade80;"></div>
    CLOUD PROTECTION ACTIVE
  </div>
</div>

<script>
// ১. সুরক্ষা (Right-Click, Inspect, View Source বন্ধ)
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false;
};

const tg = window.Telegram.WebApp;

// ২. টেলিগ্রাম অনলি রেস্ট্রিকশন
function checkTelegram() {
    if (!tg.initData || tg.platform === "unknown") {
        document.getElementById("tgOnly").style.display = "flex";
        return false;
    }
    return true;
}

if (checkTelegram()) {
    tg.ready();
    tg.expand();

    // Firebase Config (আপনার দেওয়া)
    const firebaseConfig = {
      apiKey: "AIzaSyA1CLvIhHpfJpl41ZUfWQuD-dl7l8i56CU",
      authDomain: "update-a4568.firebaseapp.com",
      projectId: "update-a4568",
      databaseURL: "https://update-a4568-default-rtdb.firebaseio.com",
      storageBucket: "update-a4568.firebasestorage.app",
      messagingSenderId: "898948028661",
      appId: "1:898948028661:web:81421946783b8e9a9e8dbc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let zone1 = "", zone2 = "", timerInterval, viewingInterval;
    const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

    // ৩. রিয়েলটাইম ডাটাবেস থেকে আইডি ফেচ
    db.ref('monetag_config').on('value', (snap) => {
        const data = snap.val();
        if(data) {
            zone1 = data.zone1; zone2 = data.zone2;
            injectSDK(zone1, zone2);
            document.getElementById("netStatus").textContent = "ONLINE";
        }
    });

    function injectSDK(z1, z2) {
        document.querySelectorAll('.monetag-script').forEach(e => e.remove());
        [z1, z2].forEach(id => {
            const s = document.createElement('script');
            s.src = '//libtl.com/sdk.js'; s.dataset.zone = id; s.dataset.sdk = 'show_' + id;
            s.className = 'monetag-script'; document.head.appendChild(s);
        });
    }

    // ৪. অরিজিনাল লজিক: কাউন্টার ও জোন রোটেশন
    let adCount = localStorage.getItem("adCount") ? parseInt(localStorage.getItem("adCount")) : 0;
    document.getElementById("adCount").textContent = adCount;
    let currentIdx = localStorage.getItem("zoneIdx") ? parseInt(localStorage.getItem("zoneIdx")) : 1;

    function showAdSmart() {
        if(!navigator.onLine) { setTimeout(showAdSmart, 5000); return; }
        const target = (currentIdx === 1) ? zone1 : zone2;
        const adFn = window['show_' + target];

        if(typeof adFn === "function") {
            document.getElementById("countdown").textContent = "Loading Ad...";
            adFn().then(() => {
                // ✅ বিজ্ঞাপন আসার পরেই কেবল কাজ শুরু হবে
                adCount++; localStorage.setItem("adCount", adCount);
                document.getElementById("adCount").textContent = adCount;
                
                // অরিজিনাল সাউন্ড ও ভাইব্রেশন
                if(navigator.vibrate) navigator.vibrate(100);
                clickSound.play();
                
                // টাইমার শুরু
                startSyncedTimers(); 
            }).catch(() => setTimeout(showAdSmart, 3000));
        } else { setTimeout(showAdSmart, 3000); }
        
        currentIdx = (currentIdx === 1) ? 2 : 1;
        localStorage.setItem("zoneIdx", currentIdx);
    }

    function startSyncedTimers() {
        // ১৬-২০ সেকেন্ড র‍্যান্ডম ডুরেশন
        let timeLeft = Math.floor(Math.random() * (20 - 16 + 1)) + 16;
        let total = timeLeft;
        let watchTime = 0;
        document.getElementById("timerLabel").innerHTML = 'Next Ad Refresh in <span id="countdown"></span>s';
        document.getElementById("viewingBadge").style.display = "block";

        clearInterval(timerInterval); clearInterval(viewingInterval);

        // উল্টো টাইমার (Dashboard)
        timerInterval = setInterval(() => {
            if(!navigator.onLine) return;
            timeLeft--;
            document.getElementById("countdown").textContent = timeLeft;
            document.getElementById("progressBar").style.width = ((total - timeLeft) / total * 100) + "%";
            if(timeLeft <= 0) { clearInterval(timerInterval); location.reload(); }
        }, 1000);

        // সোজা টাইমার (Active Watching Badge)
        viewingInterval = setInterval(() => {
            if(!navigator.onLine) return;
            watchTime++;
            document.getElementById("viewingSec").textContent = watchTime;
        }, 1000);
    }

    // ৫. রিয়েল ইউজার ক্লিক হ্যান্ডলার
    function initRealClick() {
        document.getElementById("overlay").style.display = "none";
        localStorage.setItem("systemStarted", "true");
        showAdSmart();
    }

    window.onload = () => {
        if(localStorage.getItem("systemStarted") === "true") {
            document.getElementById("overlay").style.display = "none";
            setTimeout(showAdSmart, 2500);
        } else { 
            document.getElementById("overlay").style.display = "flex"; 
        }
    };
}
</script>
</body>
</html>
