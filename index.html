<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monetag Auto Mathod</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin:0;
  height:100vh;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(-45deg,#1a2a6c,#16222a,#3a0ca3,#000);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.card {
  width:350px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 20px rgba(0,229,255,0.3);
  text-align:center;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

button {
  padding:12px 15px;
  border:none;
  border-radius:10px;
  background:#00e5ff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px #00e5ff;
}

button:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #00e5ff;
}

.timer {
  margin-top:10px;
  font-size:18px;
  color:#4caf50;
}

.progress {
  width:100%;
  height:8px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  width:0%;
  background:#00e5ff;
  transition: width 1s linear;
}

.coin {
  margin-top:10px;
  font-size:20px;
  background:#ffd700;
  color:#000;
  padding:8px 15px;
  border-radius:20px;
  display:inline-block;
  box-shadow:0 0 10px gold;
}
</style>
</head>

<body>

<div class="card">
  <h2>🚀 Auto Ads System</h2>
  <button onclick="enableAuto()">Auto Start</button>

  <div class="timer">
    Next Ads in <span id="countdown">20</span>s
  </div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="coin">
    💰 Coins: <span id="adCount">0</span>
  </div>
</div>

<script>
// 🔥 Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyA1CLvIhHpfJpl41ZUfWQuD-dl7l8i56CU",
  authDomain: "update-a4568.firebaseapp.com",
  projectId: "update-a4568",
  databaseURL: "https://update-a4568-default-rtdb.firebaseio.com",
  storageBucket: "update-a4568.firebasestorage.app",
  messagingSenderId: "898948028661",
  appId: "1:898948028661:web:81421946783b8e9a9e8dbc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let zone1 = "", zone2 = "";

// ফায়ারবেস থেকে জোন আইডি ফেচ করা
db.ref('monetag_config').on('value', (snap) => {
    const data = snap.val();
    if(data) {
        zone1 = data.zone1;
        zone2 = data.zone2;
        injectSDK(zone1, zone2);
    }
});

function injectSDK(z1, z2) {
    document.querySelectorAll('.monetag-sdk').forEach(e => e.remove());
    [z1, z2].forEach(id => {
        const s = document.createElement('script');
        s.src = '//libtl.com/sdk.js';
        s.dataset.zone = id;
        s.dataset.sdk = 'show_' + id;
        s.className = 'monetag-sdk';
        document.head.appendChild(s);
    });
}

const tg = window.Telegram.WebApp;
tg.ready();

let timerInterval;
let timeLeft = 20;

const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

function vibrate(){
  if(navigator.vibrate){ navigator.vibrate(100); }
}

let adCount = localStorage.getItem("adCount") ? parseInt(localStorage.getItem("adCount")) : 0;
document.getElementById("adCount").textContent = adCount;

let currentZoneIdx = localStorage.getItem("zoneIdx") ? parseInt(localStorage.getItem("zoneIdx")) : 1;

function showAdSmart() {
  const targetID = (currentZoneIdx === 1) ? zone1 : zone2;
  const openAd = window['show_' + targetID];

  if(typeof openAd === "function"){
    const clickEvent = new MouseEvent('click',{bubbles:true,cancelable:true,view:window});
    document.body.dispatchEvent(clickEvent);
    openAd().catch(()=>{});

    clickSound.play();
    vibrate();

    adCount++;
    localStorage.setItem("adCount", adCount);
    document.getElementById("adCount").textContent = adCount;
    
    // Animate Count
    document.getElementById("adCount").style.transform="scale(1.3)";
    setTimeout(()=>{ document.getElementById("adCount").style.transform="scale(1)"; },200);
  }

  currentZoneIdx = (currentZoneIdx === 1) ? 2 : 1;
  localStorage.setItem("zoneIdx", currentZoneIdx);
}

function startAutoTimer() {
  clearInterval(timerInterval);
  timeLeft = 20;
  document.getElementById("countdown").textContent = timeLeft;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("countdown").textContent = timeLeft;

    let percent = ((20 - timeLeft) / 20) * 100;
    document.getElementById("progressBar").style.width = percent + "%";

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      setTimeout(()=>{ location.reload(); }, 2000);
    }
  }, 1000);
}

function enableAuto() {
  localStorage.setItem("adMode", "auto");
  showAdSmart();
  startAutoTimer();
}

window.addEventListener("load", () => {
  // জোন আইডি লোড হওয়ার জন্য একটু সময় দেওয়া
  setTimeout(() => {
    localStorage.setItem("adMode", "auto");
    showAdSmart();
    startAutoTimer();
  }, 2000);
});
</script>
</body>
</html>
